name: droidal

# Whole robot stack in two containers. `docker compose up` replaces the old
# "run.sh + docker exec into desktop-full + run each script by hand" dance.
services:
  # ESP32 talks micro-ROS over WiFi/UDP; this agent bridges it onto the DDS bus.
  micro-ros-agent:
    image: microros/micro-ros-agent:jazzy
    command: udp4 --port 8888
    network_mode: host
    privileged: true
    volumes:
      - /dev:/dev
    restart: unless-stopped

  # Our custom image: lidar driver + odometry/TF bridge + slam_toolbox.
  droidal:
    image: ghcr.io/prlancas/droidalros:latest
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host        # share DDS + the lidar TCP port with the host/agent
    privileged: true          # needed only for serial /dev access
    volumes:
      - /dev:/dev
      # For live script editing without rebuilding, uncomment this line
      # (it shadows the baked-in scripts with your working copy):
      # - ./mnt:/opt/droidal
    environment:
      # SLAM mode:
      #  "localization" loads the saved map (mnt/droidal_map.*) read-only and
      #    relocalizes against it (set the pose with Foxglove's "Publish -> Pose
      #    estimate" -> /initialpose). Nav2 navigates on the fixed map.
      #  "mapping" builds/extends the map live. Nav2 still works AND the map keeps
      #    growing as you drive -- this is the mode for auto-exploration (enable
      #    the explorer with `ros2 topic pub /explore/enable std_msgs/Bool
      #    "{data: true}"`). Save the result with slam_toolbox/serialize_map.
      SLAM_MODE: "localization"
      # Default: listen for the ESP32 raw-lidar TCP forwarder on :8080.
      LIDAR_TCP_PORT: "8080"
      # For a USB-UART adapter instead, comment the line above and set:
      # LIDAR_SERIAL: "/dev/ttyUSB0"
      # LIDAR_BAUD: "115200"
      # Lidar orientation is now baked into the laser_frame TF in droidal_viz.py
      # (the raw scan is published as-is), so no --flip/--angle-offset here. Add
      # LIDAR_EXTRA_ARGS only if you need to fine-tune the scan angle offset.
      # LIDAR_EXTRA_ARGS: "--angle-offset 0"
    depends_on:
      - micro-ros-agent
    restart: unless-stopped
